<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="refBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1321"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#169B62" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0E6B42" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF883E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#CC5C1A" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="15" />
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#refBg)" rx="12"/>
  
  <!-- Glow effects -->
  <circle cx="100" cy="80" r="120" fill="url(#greenGlow)" filter="url(#blur1)"/>
  <circle cx="320" cy="200" r="100" fill="url(#orangeGlow)" filter="url(#blur1)"/>
  
  <!-- Avatar circles -->
  <g transform="translate(200, 100)">
    <!-- Left avatar (referring friend) -->
    <g transform="translate(-60, 0)">
      <circle cx="0" cy="0" r="45" fill="url(#greenGlow)" stroke="rgba(22,155,98,0.5)" stroke-width="2" filter="url(#blur2)"/>
      <circle cx="0" cy="0" r="35" fill="rgba(22,155,98,0.2)" stroke="#169B62" stroke-width="1.5"/>
      <!-- User icon -->
      <circle cx="0" cy="-8" r="12" fill="white" opacity="0.9"/>
      <path d="M -18 20 Q -18 8 0 8 Q 18 8 18 20" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
    </g>
    
    <!-- Connection lines -->
    <line x1="-25" y1="0" x2="25" y2="0" stroke="rgba(22,155,98,0.5)" stroke-width="2" stroke-dasharray="5,3"/>
    <circle cx="0" cy="0" r="12" fill="#169B62" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="system-ui">+1</text>
    
    <!-- Right avatar (new customer) -->
    <g transform="translate(60, 0)">
      <circle cx="0" cy="0" r="45" fill="url(#orangeGlow)" stroke="rgba(255,136,62,0.5)" stroke-width="2" filter="url(#blur2)"/>
      <circle cx="0" cy="0" r="35" fill="rgba(255,136,62,0.2)" stroke="#FF883E" stroke-width="1.5"/>
      <!-- User icon -->
      <circle cx="0" cy="-8" r="12" fill="white" opacity="0.9"/>
      <path d="M -18 20 Q -18 8 0 8 Q 18 8 18 20" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
    </g>
  </g>
  
  <!-- Gift box -->
  <g transform="translate(200, 220)">
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="rgba(22,155,98,0.2)" stroke="#169B62" stroke-width="1.5"/>
    <rect x="-8" y="-20" width="16" height="40" fill="rgba(22,155,98,0.3)"/>
    <circle cx="0" cy="-26" r="8" fill="rgba(22,155,98,0.3)" stroke="#169B62" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" fill="white" font-size="14" font-weight="800" font-family="system-ui">FREE</text>
  </g>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" fill="white" font-size="18" font-weight="700" font-family="system-ui">Refer a Friend</text>
  <text x="200" y="298" text-anchor="middle" fill="#8C96AA" font-size="12" font-family="system-ui">You both get +1 Month Free</text>
</svg>