<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0D1321"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </radialGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#169B62" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#169B62" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#FF883E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF883E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#169B62"/>
      <stop offset="100%" stop-color="#0E6B42"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF883E"/>
      <stop offset="100%" stop-color="#CC5C1A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)" rx="16"/>
  <!-- Glow effects -->
  <circle cx="300" cy="200" r="350" fill="url(#glow1)"/>
  <circle cx="900" cy="400" r="300" fill="url(#glow2)"/>
  <!-- Grid pattern -->
  <g stroke="rgba(255,136,62,0.05)" stroke-width="1">
    <line y1="0" x1="100" y2="600" x2="100"/><line y1="0" x1="200" y2="600" x2="200"/><line y1="0" x1="300" y2="600" x2="300"/>
    <line y1="0" x1="400" y2="600" x2="400"/><line y1="0" x1="500" y2="600" x2="500"/><line y1="0" x1="600" y2="600" x2="600"/>
    <line y1="0" x1="700" y2="600" x2="700"/><line y1="0" x1="800" y2="600" x2="800"/><line y1="0" x1="900" y2="600" x2="900"/>
    <line y1="0" x1="1000" y2="600" x2="1000"/><line y1="0" x1="1100" y2="600" x2="1100"/><line y1="0" x1="1200" y2="600" x2="1200"/>
    <line x1="0" y1="50" x2="1200" y2="50"/><line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="350" x2="1200" y2="350"/><line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="550" x2="1200" y2="550"/>
  </g>
  <!-- Central device mockup -->
  <g transform="translate(200, 80)">
    <!-- Screen frame -->
    <rect x="0" y="0" width="800" height="450" rx="12" fill="rgba(13,19,33,0.8)" stroke="rgba(255,136,62,0.15)" stroke-width="1"/>
    <rect x="20" y="20" width="760" height="390" rx="8" fill="rgba(10,14,23,0.95)" stroke="rgba(22,155,98,0.3)" stroke-width="1"/>
    <!-- Channel cards row 1 -->
    <rect x="40" y="40" width="220" height="130" rx="10" fill="rgba(22,155,98,0.1)" stroke="rgba(22,155,98,0.4)"/>
    <text x="150" y="95" text-anchor="middle" fill="white" font-family="system-ui" font-size="28" font-weight="700">10,000+</text>
    <text x="150" y="125" text-anchor="middle" fill="#8C96AA" font-family="system-ui" font-size="14">Live Channels</text>
    <rect x="280" y="40" width="220" height="130" rx="10" fill="rgba(255,136,62,0.08)" stroke="rgba(255,136,62,0.35)"/>
    <text x="390" y="95" text-anchor="middle" fill="white" font-family="system-ui" font-size="28" font-weight="700">4K Ultra HD</text>
    <text x="390" y="125" text-anchor="middle" fill="#8C96AA" font-family="system-ui" font-size="14">Crystal Clear Quality</text>
    <rect x="520" y="40" width="220" height="130" rx="10" fill="rgba(22,155,98,0.1)" stroke="rgba(22,155,62,0.4)"/>
    <text x="630" y="95" text-anchor="middle" fill="white" font-family="system-ui" font-size="28" font-weight="700">Irish Sports</text>
    <text x="630" y="125" text-anchor="middle" fill="#8C96AA" font-family="system-ui" font-size="14">All GAA & Premier League</text>
    <!-- Mini channel thumbnails row 2 -->
    <rect x="40" y="190" width="160" height="90" rx="8" fill="rgba(255,136,62,0.06)" stroke="rgba(255,136,62,0.2)"/>
    <text x="120" y="235" text-anchor="middle" fill="white" font-family="system-ui" font-size="14">Movies</text>
    <rect x="220" y="190" width="160" height="90" rx="8" fill="rgba(255,136,62,0.06)" stroke="rgba(255,136,62,0.2)"/>
    <text x="300" y="235" text-anchor="middle" fill="white" font-family="system-ui" font-size="14">Series</text>
    <rect x="400" y="190" width="160" height="90" rx="8" fill="rgba(255,136,62,0.06)" stroke="rgba(255,136,62,0.2)"/>
    <text x="480" y="235" text-anchor="middle" fill="white" font-family="system-ui" font-size="14">Kids</text>
    <rect x="580" y="190" width="160" height="90" rx="8" fill="rgba(255,136,62,0.06)" stroke="rgba(255,136,62,0.2)"/>
    <text x="660" y="235" text-anchor="middle" fill="white" font-family="system-ui" font-size="14">News</text>
    <!-- Play button overlay -->
    <g transform="translate(375, 325)">
      <circle cx="25" cy="25" r="30" fill="url(#green)" opacity="0.9"/>
      <polygon points="18,15 36,25 18,35" fill="white" opacity="0.95"/>
    </g>
  </g>
  <!-- Floating elements -->
  <g opacity="0.5">
    <circle cx="180" cy="280" r="60" fill="url(#glow2)" filter="url(#blur)"/>
    <circle cx="1020" cy="150" r="50" fill="url(#glow1)" filter="url(#blur)"/>
  </g>
  <!-- Branding at bottom -->
  <text x="600" y="565" text-anchor="middle" fill="white" font-family="system-ui" font-size="24" font-weight="800">IPTV Ireland</text>
  <text x="600" y="590" text-anchor="middle" fill="#8C96AA" font-family="system-ui" font-size="12">Best IPTV Subscription in Ireland — 10,000+ Channels in 4K</text>
</svg>